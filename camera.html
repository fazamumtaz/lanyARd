<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <title>POP | Kamera AR</title>
  <link rel="stylesheet" href="global.css" />

  <style>
    body,
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    video {
      width: 100vw !important;
      height: 100vh !important;
      object-fit: cover !important;
      position: absolute !important;
      top: 0 !important;
      left: 0 !important;
      z-index: 0 !important;
    }

    /* Paksa A-Frame canvas tetap di belakang UI kita */
    a-scene canvas,
    canvas.a-canvas {
      z-index: 1 !important;
      position: absolute !important;
      top: 0 !important;
      left: 0 !important;
    }

    #arUI {
      position: fixed;
      inset: 0;
      z-index: 100;
      pointer-events: none;
    }

    #arUI button,
    #arUI>div {
      pointer-events: all;
    }

    /* ── Capture flash effect ── */
    #flash {
      position: fixed;
      inset: 0;
      background: white;
      opacity: 0;
      pointer-events: none;
      z-index: 9999;
      transition: opacity 0.08s ease;
    }

    #flash.active {
      opacity: 0.85;
    }

    /* ── Shutter button pulse ── */
    @keyframes shutterPulse {
      0% {
        transform: scale(1);
      }

      40% {
        transform: scale(0.88);
      }

      100% {
        transform: scale(1);
      }
    }

    .shutter-press {
      animation: shutterPulse 0.25s ease forwards;
    }

    /* ── Preview overlay ── */
    #previewOverlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      padding: 1.5rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    #previewOverlay.show {
      opacity: 1;
      pointer-events: all;
    }

    #previewCanvas {
      max-width: min(90vw, 480px);
      max-height: 60vh;
      width: auto;
      height: auto;
      border: 3px solid black;
      box-shadow: 8px 8px 0px #edfe8b;
      border-radius: 4px;
      display: block;
    }

    /* ── Scan frame corners ── */
    .corner {
      position: absolute;
      width: 28px;
      height: 28px;
      border-color: white;
      border-style: solid;
      opacity: 0.7;
    }

    .corner-tl {
      top: 16px;
      left: 16px;
      border-width: 3px 0 0 3px;
    }

    .corner-tr {
      top: 16px;
      right: 16px;
      border-width: 3px 3px 0 0;
    }

    .corner-bl {
      bottom: 16px;
      left: 16px;
      border-width: 0 0 3px 3px;
    }

    .corner-br {
      bottom: 16px;
      right: 16px;
      border-width: 0 3px 3px 0;
    }

    /* Shutter button */
    #shutterBtn {
      width: 68px;
      height: 68px;
      border-radius: 9999px;
      background: white;
      border: 4px solid black;
      box-shadow: 4px 4px 0px black;
      cursor: pointer;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: box-shadow 0.1s;
    }

    #shutterBtn:active {
      box-shadow: 2px 2px 0px black;
      transform: translate(2px, 2px);
    }

    #shutterBtn::after {
      content: '';
      width: 48px;
      height: 48px;
      border-radius: 9999px;
      background: #edfe8b;
      border: 3px solid black;
    }

    /* Action buttons */
    .action-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 22px;
      font-family: 'PT Mono', monospace;
      font-weight: 700;
      font-size: 14px;
      border: 3px solid black;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
    }

    .action-btn:hover {
      transform: translate(-2px, -2px);
    }

    .action-btn:active {
      transform: translate(2px, 2px);
    }

    .btn-download {
      background: #edfe8b;
      box-shadow: 5px 5px 0px black;
    }

    .btn-download:hover {
      box-shadow: 7px 7px 0px black;
    }

    .btn-download:active {
      box-shadow: 2px 2px 0px black;
    }

    .btn-share {
      background: #00D6BD;
      box-shadow: 5px 5px 0px black;
    }

    .btn-share:hover {
      box-shadow: 7px 7px 0px black;
    }

    .btn-share:active {
      box-shadow: 2px 2px 0px black;
    }

    .btn-retake {
      background: white;
      box-shadow: 5px 5px 0px black;
    }

    .btn-retake:hover {
      box-shadow: 7px 7px 0px black;
    }

    .btn-retake:active {
      box-shadow: 2px 2px 0px black;
    }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: black;
      color: white;
      font-family: 'PT Mono', monospace;
      font-size: 13px;
      padding: 10px 20px;
      border: 2px solid #edfe8b;
      opacity: 0;
      pointer-events: none;
      z-index: 9999;
      transition: opacity 0.2s, transform 0.2s;
      white-space: nowrap;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>

<body>

  <!-- ── Flash overlay ── -->
  <div id="flash"></div>

  <!-- ── Toast ── -->
  <div id="toast"></div>

  <!-- ── AR Camera controls ── -->
  <div id="arUI">
    <!-- Back button -->
    <div class="absolute top-5 left-5 z-10">
      <button onclick="goBack()"
        class="bg-white px-4 py-2 border-[3px] border-black shadow-[5px_5px_0px_black] mono font-bold text-sm">
        ← Back
      </button>
    </div>

    <!-- ID badge -->
    <div
      class="absolute top-5 right-5 z-10 bg-[#edfe8b] px-4 py-2 border-[3px] border-black shadow-[5px_5px_0px_black] mono font-bold text-sm">
      ID: <span id="displayId"></span>
    </div>

    <!-- Scan frame corners -->
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <!-- Bottom controls -->
    <div class="absolute bottom-8 left-1/2 -translate-x-1/2 z-10 flex flex-col items-center gap-4">
      <!-- How to use -->
      <button onclick="toggleHow()"
        class="bg-white px-5 py-2 border-[3px] border-black shadow-[5px_5px_0px_black] mono font-bold text-sm">
        Cara pantek
      </button>
      <div id="howBox"
        class="hidden bg-white p-4 border-[3px] border-black shadow-[6px_6px_0px_black] text-sm mono max-w-xs">
        <ol class="list-decimal ml-4 text-left space-y-1">
          <li>Arahkan kamera ke target</li>
          <li>Pastikan cahaya cukup</li>
          <li>Tunggu objek AR muncul</li>
          <li>Tekan tombol kuning untuk capture</li>
        </ol>
      </div>

      <!-- Shutter -->
      <button id="shutterBtn" onclick="captureAR()" title="Capture"></button>
    </div>
  </div>

  <!-- ── Preview Overlay ── -->
  <div id="previewOverlay">
    <!-- Label -->
    <div class="mono font-bold text-white text-lg tracking-wide" style="letter-spacing: 0.05em;">
      📸 Hasil Capture
    </div>

    <!-- Preview image -->
    <canvas id="previewCanvas"></canvas>

    <!-- Action buttons -->
    <div class="flex flex-row gap-3 flex-wrap justify-center">
      <button class="action-btn btn-retake" onclick="retake()">
        <svg width="16" height="16" viewBox="0 0 20 20" fill="none">
          <path d="M3 10C3 6.13 6.13 3 10 3C12.1 3 14 3.9 15.4 5.3L17 7H13" stroke="black" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" />
          <path d="M17 10C17 13.87 13.87 17 10 17C7.9 17 6 16.1 4.6 14.7L3 13H7" stroke="black" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        Ambil Lagi
      </button>

      <button class="action-btn btn-download" onclick="downloadCapture()">
        <svg width="16" height="16" viewBox="0 0 20 20" fill="none">
          <path d="M10 3V13M10 13L6 9M10 13L14 9" stroke="black" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round" />
          <path d="M3 16H17" stroke="black" stroke-width="2" stroke-linecap="round" />
        </svg>
        Download
      </button>

      <button class="action-btn btn-share" onclick="shareCapture()">
        <svg width="16" height="16" viewBox="0 0 20 20" fill="none">
          <circle cx="15" cy="4" r="2" stroke="black" stroke-width="1.8" />
          <circle cx="15" cy="16" r="2" stroke="black" stroke-width="1.8" />
          <circle cx="5" cy="10" r="2" stroke="black" stroke-width="1.8" />
          <path d="M7 9L13 5M7 11L13 15" stroke="black" stroke-width="1.8" stroke-linecap="round" />
        </svg>
        Share
      </button>
    </div>


  </div>

  <script>
    // ── Init ──
    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get('id') || '-';
    const productId = id.toLowerCase();
    document.getElementById('displayId').innerText = id;

    let capturedDataURL = null;

    // ── AR Init ──
    async function initAR() {
      const targetPath = `./ar/${productId}/targets.mind`;
      const modelPath = `./ar/${productId}/model.glb`;

      try {
        const res = await fetch(targetPath, { method: 'HEAD' });
        if (!res.ok) throw new Error('File tidak ada');

        const sceneHTML = `
          <a-scene
            mindar-image="imageTargetSrc: ${targetPath}; uiScanning: yes;"
            color-space="sRGB"
            renderer="colorManagement: true, physicallyCorrectLights, preserveDrawingBuffer: true"
            vr-mode-ui="enabled: false"
            device-orientation-permission-ui="enabled: false"
            style="width:100vw;height:100vh;position:absolute;top:0;left:0;z-index:1;">
            <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
            <a-entity id="target" mindar-image-target="targetIndex: 0">
              <a-entity
                gltf-model="${modelPath}"
                rotation="0 0 0"
                position="0 -5.1 0"
                scale="1.1 1.1 1.1"
                animation="property: rotation; to: 0 -360 0; dur: 5000; easing: linear; loop: true">
              </a-entity>
            </a-entity>
          </a-scene>`;

        document.body.insertAdjacentHTML('beforeend', sceneHTML);
      } catch (err) {
        alert('AR Produk belum tersedia');
        window.location.href = 'catalog.html';
      }
    }

    window.onload = initAR;

    // ── Capture ──
    function captureAR() {
      // Visual feedback dulu
      const flash = document.getElementById('flash');
      flash.classList.add('active');
      setTimeout(() => flash.classList.remove('active'), 200);

      const btn = document.getElementById('shutterBtn');
      btn.classList.add('shutter-press');
      setTimeout(() => btn.classList.remove('shutter-press'), 300);

      // Double rAF: tunggu WebGL selesai render frame berikutnya
      // sebelum baca pixel. Ini krusial di mobile agar buffer tidak kosong.
      requestAnimationFrame(() => {
        requestAnimationFrame(() => doCapture());
      });
    }

    function doCapture() {
      const video = document.querySelector('video');
      const aframeCanvas = document.querySelector('canvas.a-canvas') || document.querySelector('canvas');

      const vw = video ? video.videoWidth : 1280;
      const vh = video ? video.videoHeight : 720;

      // ── Reproduce object-fit: cover crop ──
      const screenW = window.innerWidth;
      const screenH = window.innerHeight;
      const screenRatio = screenW / screenH;
      const videoRatio = vw / vh;

      let srcX, srcY, srcW, srcH;
      if (videoRatio > screenRatio) {
        srcH = vh;
        srcW = vh * screenRatio;
        srcX = (vw - srcW) / 2;
        srcY = 0;
      } else {
        srcW = vw;
        srcH = vw / screenRatio;
        srcX = 0;
        srcY = (vh - srcH) / 2;
      }

      const composite = document.createElement('canvas');
      composite.width = Math.round(srcW);
      composite.height = Math.round(srcH);
      const ctx = composite.getContext('2d');

      // 1. Draw cropped video frame
      if (video && video.readyState >= 2) {
        ctx.save();
        try {
          const track = video.srcObject?.getVideoTracks()[0];
          const settings = track?.getSettings();
          if (settings?.facingMode === 'user') {
            ctx.translate(composite.width, 0);
            ctx.scale(-1, 1);
          }
        } catch (_) { }
        ctx.drawImage(video, srcX, srcY, srcW, srcH, 0, 0, composite.width, composite.height);
        ctx.restore();
      }

      // 2. Overlay A-Frame WebGL canvas
      if (aframeCanvas) {
        try {
          // Cek pixel tengah via WebGL context — mobile safeguard
          // supaya tidak overlay canvas hitam kosong di atas video
          const gl = aframeCanvas.getContext('webgl') || aframeCanvas.getContext('webgl2');
          if (gl) {
            const pixel = new Uint8Array(4);
            gl.readPixels(
              Math.floor(aframeCanvas.width / 2),
              Math.floor(aframeCanvas.height / 2),
              1, 1,
              gl.RGBA, gl.UNSIGNED_BYTE,
              pixel
            );
            // Alpha > 0 berarti ada konten AR — aman di-composite
            if (pixel[3] > 0) {
              ctx.drawImage(aframeCanvas, 0, 0, composite.width, composite.height);
            }
          } else {
            ctx.drawImage(aframeCanvas, 0, 0, composite.width, composite.height);
          }
        } catch (_) {
          // Tainted/cross-origin — skip overlay
        }
      }

      capturedDataURL = composite.toDataURL('image/png');
      showPreview(capturedDataURL, composite.width, composite.height);
    }

    // ── Preview ──
    function showPreview(dataURL, srcW, srcH) {
      const previewCanvas = document.getElementById('previewCanvas');
      previewCanvas.width = srcW;
      previewCanvas.height = srcH;
      const ctx = previewCanvas.getContext('2d');
      const img = new Image();
      img.onload = () => ctx.drawImage(img, 0, 0);
      img.src = dataURL;

      document.getElementById('previewOverlay').classList.add('show');
    }

    // ── Retake ──
    function retake() {
      capturedDataURL = null;
      document.getElementById('previewOverlay').classList.remove('show');
    }

    // ── Download ──
    function downloadCapture() {
      if (!capturedDataURL) return;
      const a = document.createElement('a');
      a.href = capturedDataURL;
      a.download = `POP_${productId}_${Date.now()}.png`;
      a.click();
      showToast('📥 Foto tersimpan!');
    }

    // ── Share ──
    async function shareCapture() {
      if (!capturedDataURL) return;

      // Convert dataURL to Blob
      const res = await fetch(capturedDataURL);
      const blob = await res.blob();
      const file = new File([blob], `POP_${productId}.png`, { type: 'image/png' });

      if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
        try {
          await navigator.share({
            title: 'POP AR Experience',
            text: 'Lihat pengalaman AR-ku dari POP! 🎉',
            files: [file],
          });
        } catch (err) {
          if (err.name !== 'AbortError') showToast('Gagal share 😢');
        }
      } else if (navigator.share) {
        // Fallback: share URL only
        try {
          await navigator.share({
            title: 'POP AR Experience',
            text: 'Lihat pengalaman AR-ku dari POP! 🎉\nhttps://hi.pop.ar',
          });
        } catch (_) { }
      } else {
        // Desktop fallback: copy to clipboard
        try {
          await navigator.clipboard.writeText('https://hi.pop.ar');
          showToast('📋 Link disalin!');
        } catch (_) {
          showToast('Share tidak tersedia di browser ini');
        }
      }
    }

    // ── Toast ──
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // ── Helpers ──
    function goBack() { window.history.back(); }
    function toggleHow() { document.getElementById('howBox').classList.toggle('hidden'); }
  </script>
</body>

</html>
