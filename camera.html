<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <title>POP | Pilih Produk</title>

  <link rel="stylesheet" href="global.css" />
  <style>
    /* Paksa body dan scene mengambil seluruh ruang layar */
    body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
    }

    video {
        width: 100vw !important;
        height: 100vh !important;
        object-fit: cover !important;
        position: absolute !important;
        top: 0 !important;
        left: 0 !important;
    }
</style>
</head>

<body class="bg-black overflow-hidden">
  <!-- OVERLAY -->
  <div class="absolute top-5 left-5 z-10">
      <button onclick="goBack()" class="bg-white px-4 py-2 border-[3px] border-black shadow-[5px_5px_0px_black] mono font-bold">← Back</button>
  </div>

  <!-- ID DISPLAY -->
  <div class="absolute top-5 right-5 z-10 bg-[#edfe8b] px-4 py-2 border-[3px] border-black shadow-[5px_5px_0px_black] mono font-bold">ID: <span id="displayId"></span></div>

  <!-- TOGGLE HOW -->
  <div class="absolute bottom-5 left-1/2 -translate-x-1/2 z-10 text-center">
      <button onclick="toggleHow()" class="bg-white px-5 py-2 border-[3px] border-black shadow-[5px_5px_0px_black] mono font-bold">Cara pakai</button>

      <div id="howBox" class="hidden mt-3 bg-white p-4 border-[3px] border-black shadow-[6px_6px_0px_black] text-sm mono max-w-xs">
        <ol class="list-decimal ml-4 text-left space-y-1">
            <li>Arahkan kamera ke target</li>
            <li>Pastikan cahaya cukup</li>
            <li>Tunggu objek muncul</li>
        </ol>
      </div>
  </div>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get('id');
    const poductId = id.toLocaleLowerCase()
  
    async function initAR() {
      const targetPath = `./ar/${productId}/targets.mind`;
      const modelPath = `./ar/${productId}/model.glb`;
  
      try {
        const response = await fetch(targetPath, { method: 'HEAD' });
        if (!response.ok) throw new Error("File tidak ada");
  
        const sceneHTML = `
          <a-scene 
            mindar-image="imageTargetSrc: ${targetPath}; uiScanning: yes;" 
            color-space="sRGB" 
            renderer="colorManagement: true, physicallyCorrectLights" 
            vr-mode-ui="enabled: false" 
            device-orientation-permission-ui="enabled: false"
            style="width: 100vw; height: 100vh; position: absolute; top: 0; left: 0;">
            
            <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
  
            <a-entity id="target" mindar-image-target="targetIndex: 0">
              <a-entity gltf-model="${modelPath}" rotation="0 0 0" position="0 -0.75 0" scale="0.3 0.3 0.3" animation="property: rotation; to: 0 360 0; dur: 5000; easing: linear; loop: true"> </a-entity>
            </a-entity>
          </a-scene>
        `;
        document.body.insertAdjacentHTML('beforeend', sceneHTML);
  
      } catch (err) {
        alert("AR Produk belum tersedia");
        window.location.href = "catalog.html";
      }
    }
  
    window.onload = initAR;
  
    function getId() {
        const params = new URLSearchParams(window.location.search);
      return params.get("id");
    }
  
    function goBack() {
      window.history.back();
    }
  
    function toggleHow() {
      document.getElementById("howBox").classList.toggle("hidden");
    }
  
    document.getElementById("displayId").innerText = getId() || "-";
    console.log(getId);
  </script>
</body>

</html>
