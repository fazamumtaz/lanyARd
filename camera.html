<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <title>POP | Pilih Produk</title>

  <link rel="stylesheet" href="global.css" />
</head>

<body class="bg-black overflow-hidden">
  <!-- CAMERA -->
  <a-scene mindar-image="imageTargetSrc: ./ar/kch-01/targets.mind; uiScanning: yes;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="target" mindar-image-target="targetIndex: 0">
      <a-entity gltf-model="./ar/kch-01/model.glb" rotation="90 0 0" position="0 0 0" scale="10 10 10"> </a-entity>
    </a-entity>
  </a-scene>

  <!-- OVERLAY -->
  <div class="absolute top-5 left-5 z-10">
      <button onclick="goBack()" class="bg-white px-4 py-2 border-[3px] border-black shadow-[5px_5px_0px_black] mono font-bold">← Back</button>
  </div>

  <!-- ID DISPLAY -->
  <div class="absolute top-5 right-5 z-10 bg-[#edfe8b] px-4 py-2 border-[3px] border-black shadow-[5px_5px_0px_black] mono font-bold">ID: <span id="displayId"></span></div>

  <!-- TARGET FRAME
  <div class="absolute inset-0 flex items-center justify-center">
      <div class="w-[250px] h-[350px] border-[3px] border-white rounded-xl"></div>
  </div> -->

  <!-- TOGGLE HOW -->
  <div class="absolute bottom-5 left-1/2 -translate-x-1/2 z-10 text-center">
      <button onclick="toggleHow()" class="bg-white px-5 py-2 border-[3px] border-black shadow-[5px_5px_0px_black] mono font-bold">Cara pakai</button>

      <div id="howBox" class="hidden mt-3 bg-white p-4 border-[3px] border-black shadow-[6px_6px_0px_black] text-sm mono max-w-xs">
        <ol class="list-decimal ml-4 text-left space-y-1">
            <li>Arahkan kamera ke target</li>
            <li>Pastikan cahaya cukup</li>
            <li>Tunggu objek muncul</li>
        </ol>
      </div>
  </div>

  <script>
      const video = document.getElementById("camera");

      // async function startCamera() {
      //   try {
      //       const stream = await navigator.mediaDevices.getUserMedia({
      //         video: { facingMode: "environment" },
      //       });
      //       video.srcObject = stream;
      //   } catch (err) {
      //       alert("Tidak bisa akses kamera");
      //   }
      // }

      function getId() {
        const params = new URLSearchParams(window.location.search);
        return params.get("id");
      }

      function goBack() {
        window.history.back();
      }

      function toggleHow() {
        document.getElementById("howBox").classList.toggle("hidden");
      }

      document.getElementById("displayId").innerText = getId() || "-";

      startCamera();
  </script>
</body>

</html>
